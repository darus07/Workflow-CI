name: Machine Learning Workflow CI

on:
  push:
    branches:
      - main
      - master

jobs:
  retrain-model:
    runs-on: ubuntu-latest

    steps:
    # 1. Mengunduh kode dari repositori GitHub ke runner
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Python di lingkungan GitHub Actions
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    # 3. Memasang pustaka dasar (Tanpa Conda Environment tambahan agar ringkas)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.19.0 scikit-learn pandas

    # 4. Menjalankan automated training langsung mengeksekusi modelling.py
    - name: Run MLflow Training
      run: |
        cd MLProject
        python modelling.py